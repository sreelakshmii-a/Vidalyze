name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1 — Test suite (Python 3.10 + 3.11)
  # ─────────────────────────────────────────────
  test:
    name: Tests · Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        # API keys are intentionally empty — all external calls are mocked
        env:
          YOUTUBE_API_KEY: test-ci-key
          GEMINI_API_KEY: ""
        run: |
          pytest tests/ \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-omit="tests/*,v1.0.0/*,v2.0.0/*,v3.0.0/*,VID/*"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false   # Don't break CI if Codecov is not configured

  # ─────────────────────────────────────────────
  # Job 2 — Lint with ruff
  # ─────────────────────────────────────────────
  lint:
    name: Lint · ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Run ruff (check only)
        run: ruff check . --output-format=github

  # ─────────────────────────────────────────────
  # Job 3 — Secret scanning with Gitleaks
  # ─────────────────────────────────────────────
  secrets:
    name: Secret scan · Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for accurate scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # Job 4 — Docker build smoke test
  # ─────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test]       # only if tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: false
          tags: vidalyze:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
